            font-weight: 600;
        }

        .info-content {
            font-size: 16px;
            color: #e8e8e8;
            line-height: 1.8;
        }

        .location {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        .location-item {
            background-color: rgba(0, 255, 200, 0.1);
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid #00ffc8;
            font-size: 14px;
            color: #00ffc8;
        }

        .links-section {
            margin-top: 35px;
        }

        .links-grid {
            display: grid;
            gap: 12px;
        }

        .link-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 20px;
            background-color: rgba(0, 255, 200, 0.05);
            border: 1px solid #00ffc8;
            border-radius: 10px;
            text-decoration: none;
            color: #ffffff;
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .link-item:hover {
            background-color: #00ffc8;
            color: #000000;
            transform: translateX(5px);
            box-shadow: 0 0 20px rgba(0, 255, 200, 0.3);
        }

        .link-label {
            font-weight: 600;
            font-size: 16px;
        }

        .link-arrow {
            font-size: 20px;
            transition: transform 0.3s ease;
        }

        .link-item:hover .link-arrow {
            transform: translateX(5px);
        }

        .server-badge {
            background-color: #7c3aed;
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 10px;

        .footer {

            padding-top: 30px;

            color: #888888;
            font-size: 14px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }

            .profile-header {
                flex-direction: column;
                gap: 20px;
            }

            .profile-icons {
                width: 100%;
                justify-content: center;
            }

            .profile-icon {
                width: 100px;
                height: 100px;
            }

            .whale-icon {
                width: 120px;
                height: 120px;
            }

            .name {

            }

            .location {

                width: 100%;
                text-align: center;
